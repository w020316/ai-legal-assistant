# AI 法律助手 - 云端生产部署配置
# 适用于 Sealos、Zeabur 等支持 docker-compose 的云平台
#
# 部署步骤：
# 1. 等 GitHub Actions 构建镜像完成（仓库 Actions 标签页）
# 2. 登录 Sealos → 应用部署 → 上传此文件
# 3. 配置环境变量：AGNES_API_KEY, JWT_SECRET
# 4. 绑定域名，访问
#
# 镜像来源：ghcr.io/w020316/lawai-{postgres,backend,frontend}

services:
  postgres:
    image: ghcr.io/w020316/lawai-postgres:latest
    environment:
      POSTGRES_DB: lawai
      POSTGRES_USER: lawai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lawai123}
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawai -d lawai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/w020316/lawai-backend:latest
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: lawai
      DB_USER: lawai
      DB_PASSWORD: ${DB_PASSWORD:-lawai123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      AGNES_API_KEY: ${AGNES_API_KEY}
      AGNES_BASE_URL: ${AGNES_BASE_URL:-https://agnes-ai.com}
      JWT_SECRET: ${JWT_SECRET:-lawai-prod-jwt-secret-32-chars-minimum-2026}
      JWT_ACCESS_EXPIRATION: 7200000
      JWT_REFRESH_EXPIRATION: 604800000
      UPLOAD_PATH: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/w020316/lawai-frontend:latest
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
  uploads:
