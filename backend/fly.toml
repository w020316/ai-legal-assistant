app = "lawai-backend"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  DB_HOST = "lawai-pg.internal"
  DB_PORT = "5432"
  DB_NAME = "lawai"
  DB_USER = "lawai"
  # v1.9.2 安全修复：敏感密钥已迁移至 Fly secrets，不再硬编码入仓库
  # DB_PASSWORD / REDIS_PASSWORD / JWT_SECRET / ADMIN_PASSWORD / TACKLEKEY_API_KEY
  # 通过 `fly secrets set` 注入，见部署文档
  REDIS_HOST = "lawai-redis.internal"
  REDIS_PORT = "6379"
  AGNES_BASE_URL = "https://apihub.agnes-ai.com"
  JWT_ACCESS_EXPIRATION = "7200000"
  JWT_REFRESH_EXPIRATION = "604800000"
  UPLOAD_PATH = "/app/uploads"
  ADMIN_USERNAME = "admin"
  # AI 模型路由：Tacklekey 免费模型优先，Agnes 降级
  TACKLEKEY_ENABLED = "true"
  TACKLEKEY_BASE_URL = "https://api.tacklekey.com"
  TACKLEKEY_MODEL = "openai/gpt-5.5:free"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [services.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"

[[vm]]
  size = "shared-cpu-1x"
  memory = 512
