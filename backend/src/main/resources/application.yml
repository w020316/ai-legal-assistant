spring:
  application:
    name: ai-legal-assistant
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Jackson（Spring AI 1.0 与 Spring Boot 3.4 共用 Jackson 2，无版本冲突）
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # Servlet
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  # AI - Agnes (OpenAI V1 兼容)
  ai:
    openai:
      base-url: ${AGNES_BASE_URL:https://apihub.agnes-ai.com}
      api-key: ${AGNES_API_KEY}
      chat:
        options:
          model: agnes-2.0-flash
          temperature: 0.3
          max-tokens: 4096
      embedding:
        options:
          model: agnes-embedding
    # 减少重试次数，embedding 模型不可用时不阻塞太久
    retry:
      max-attempts: 2
      backoff:
        initial-interval: 1000
        multiplier: 2.0
        max-interval: 5000

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.lawai.legalassistant.modules.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Springdoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

# 应用自定义配置
lawai:
  # 安全放行路径（逗号分隔字符串，由 @Value 自动分割为 List<String>）
  security:
    permit-paths: ${PERMIT_PATHS:/api/v1/auth/**,/api/v1/health,/api/v1/ai/test/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html}
  # JWT 配置
  jwt:
    secret: ${JWT_SECRET:lawai-default-jwt-secret-please-change-in-production-at-least-32-chars}
    access-expiration: ${JWT_ACCESS_EXPIRATION:7200000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  # 初始化管理员
  init:
    admin:
      username: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}
  # CORS
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://localhost,https://lawai-frontend.fly.dev}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    allow-credentials: true
    max-age: 3600
  # 文件上传存储路径
  upload:
    path: ${UPLOAD_PATH:./uploads}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  forward-headers-strategy: framework

logging:
  level:
    com.lawai.legalassistant: debug
    org.springframework.ai: info
