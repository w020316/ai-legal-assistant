# 开发环境配置
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lawai}
    username: ${DB_USER:lawai}
    password: ${DB_PASSWORD:lawai123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

# 开发环境开启 Swagger
springdoc:
  swagger-ui:
    enabled: true

# 开发环境特有配置：提供本地默认密钥与管理员密码，放行 AI 测试接口
lawai:
  security:
    permit-paths: /api/v1/auth/**,/api/v1/health,/api/v1/ai/test/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-do-not-use-in-production-at-least-32-chars-long}
  init:
    admin:
      username: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:admin123}

logging:
  level:
    com.lawai.legalassistant: debug
